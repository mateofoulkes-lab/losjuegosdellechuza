<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sala de Juegos</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --card: rgba(255, 255, 255, 0.78);
      --text: #26231f;
      --muted: #8b8174;
      --line: rgba(38, 35, 31, 0.11);
      --accent: #3f6f63;
      --accent-soft: #e4eee9;
      --disabled: #c6bfb5;
      --shadow: 0 24px 70px rgba(65, 52, 38, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 34rem),
        linear-gradient(135deg, #fbfaf7 0%, var(--bg) 52%, #eee8dd 100%);
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    main {
      width: min(100%, 560px);
      min-height: min(760px, calc(100vh - 64px));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 42px;
    }

    .logo-space {
      width: 25vw;
      min-width: 150px;
      max-width: 250px;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .logo-space::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 24px;
      border: 1px dashed rgba(38, 35, 31, 0.16);
    }

    .logo-space span {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 1;
    }

    .panel {
      width: 100%;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 8vw, 3.4rem);
      line-height: 0.95;
      letter-spacing: -0.075em;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      text-align: center;
      font-size: 0.98rem;
    }

    .games {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .game-link,
    .game-disabled {
      min-height: 58px;
      border-radius: 19px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      border: 1px solid var(--line);
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .game-link {
      color: var(--text);
      background: #ffffff;
    }

    .game-link:hover,
    .game-link:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(63, 111, 99, 0.34);
      background: var(--accent-soft);
      outline: none;
    }

    .game-link strong,
    .game-disabled strong {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .game-link em,
    .game-disabled em {
      font-style: normal;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .game-link .arrow {
      color: var(--accent);
      font-size: 1.15rem;
      margin-left: 16px;
    }

    .game-disabled {
      color: var(--disabled);
      background: rgba(255, 255, 255, 0.36);
      cursor: not-allowed;
    }

    .game-disabled em {
      color: #b7aea2;
    }

    footer {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
    }

    @media (max-width: 520px) {
      body {
        padding: 22px 14px;
      }

      main {
        gap: 30px;
      }

      .panel {
        padding: 22px;
        border-radius: 28px;
      }

      .logo-space {
        width: 42vw;
        min-width: 130px;
        border-radius: 28px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo-space" aria-label="Espacio para logo">
      <span>Logo</span>
    </div>

    <section class="panel" aria-labelledby="title">
      <h1 id="title">Juegos</h1>
      <p class="subtitle">Elegí una sala y empezá a jugar.</p>

      <ul class="games">
        <li>
          <a class="game-link" href="spyfall.html">
            <span>
              <strong>Spyfall</strong><br />
              <em>Disponible</em>
            </span>
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </li>

        <li>
          <div class="game-disabled" aria-disabled="true">
            <span>
              <strong>Dixit Express</strong><br />
              <em>Próximamente</em>
            </span>
          </div>
        </li>

        <li>
          <div class="game-disabled" aria-disabled="true">
            <span>
              <strong>Palabras Secretas</strong><br />
              <em>Próximamente</em>
            </span>
          </div>
        </li>

        <li>
          <div class="game-disabled" aria-disabled="true">
            <span>
              <strong>La Coartada</strong><br />
              <em>Próximamente</em>
            </span>
          </div>
        </li>

        <li>
          <div class="game-disabled" aria-disabled="true">
            <span>
              <strong>Trivia Relámpago</strong><br />
              <em>Próximamente</em>
            </span>
          </div>
        </li>
      </ul>
    </section>

    <footer>Una mesa, una sala, cero vueltas.</footer>
  </main>
</body>
</html>
