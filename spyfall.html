<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10131a" />
  <title>Infiltrado</title>

  <style>
    :root {
      --bg-1: #111827;
      --bg-2: #07080d;
      --card: rgba(15, 18, 27, .88);
      --soft: rgba(255,255,255,.07);
      --soft-2: rgba(255,255,255,.11);
      --line: rgba(255,255,255,.12);
      --text: #f5f7fb;
      --muted: #aab4c4;
      --gold: #ffe08a;
      --orange: #ff8c6b;
      --green: #68d391;
      --red: #f87171;
      --danger: #ffb4b4;
      --radius: 24px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #26364f, var(--bg-1) 48%, var(--bg-2));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      touch-action: manipulation;
    }

    button, input {
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: 0;
      border-radius: 17px;
      padding: 14px 16px;
      background: var(--soft-2);
      color: var(--text);
      font-weight: 850;
      cursor: pointer;
    }

    button:active { transform: translateY(1px) scale(.995); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    input {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 17px;
      padding: 14px 16px;
      background: rgba(255,255,255,.075);
      color: white;
      outline: none;
      font-size: 17px;
    }

    input:focus {
      border-color: rgba(255,224,138,.8);
      box-shadow: 0 0 0 4px rgba(255,224,138,.12);
    }

    label {
      display: grid;
      gap: 8px;
      color: #d7deea;
      font-size: 14px;
      font-weight: 700;
    }

    .app {
      width: min(100%, 440px);
    }

    .card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 20px;
      background: var(--card);
      box-shadow: 0 24px 80px rgba(0,0,0,.42);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .logo {
      width: 50px;
      height: 50px;
      flex: 0 0 auto;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--gold), var(--orange));
      color: #111;
      font-size: 28px;
      font-weight: 1000;
      box-shadow: 0 10px 24px rgba(255, 140, 107, .24);
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 29px; letter-spacing: -.055em; line-height: .95; }
    h2 { font-size: 25px; letter-spacing: -.045em; }
    h3 { font-size: 18px; }

    .brand p, .muted {
      color: var(--muted);
      line-height: 1.45;
    }

    .stack { display: grid; gap: 14px; }

    .primary {
      background: linear-gradient(145deg, var(--gold), var(--orange));
      color: #141414;
      box-shadow: 0 12px 28px rgba(255,140,107,.20);
    }

    .ghost {
      min-height: 42px;
      padding: 10px 12px;
      font-size: 13px;
      background: rgba(255,255,255,.08);
    }

    .danger-btn {
      background: rgba(255, 88, 88, .12);
      color: var(--danger);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #7d8898;
      font-size: 13px;
      font-weight: 700;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.10);
    }

    .notice {
      display: none;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 17px;
      border: 1px solid rgba(255,224,138,.22);
      background: rgba(255,224,138,.12);
      color: #ffe8a9;
      font-size: 14px;
      line-height: 1.35;
    }
    .notice.show { display: block; }
    .notice.danger {
      border-color: rgba(255,88,88,.24);
      background: rgba(255,88,88,.12);
      color: #ffc2c2;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 21px;
      background: var(--soft);
    }

    .eyebrow {
      display: block;
      color: #8d98aa;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: .12em;
      font-weight: 900;
    }

    .code {
      display: block;
      margin-top: 2px;
      font-size: 29px;
      letter-spacing: .02em;
      line-height: 1;
    }

    .players { display: grid; gap: 8px; }

    .player {
      min-height: 50px;
      border-radius: 17px;
      padding: 13px 14px;
      background: var(--soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .player strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tags {
      display: flex;
      gap: 5px;
      flex: 0 0 auto;
    }

    .tag {
      color: #111;
      background: var(--gold);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 950;
    }

    .empty-slot {
      color: #7d8898;
      border: 1px dashed rgba(255,255,255,.13);
      background: transparent;
    }

    .panel {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.10);
      background: var(--soft);
      text-align: center;
    }

    .timer {
      font-size: clamp(54px, 17vw, 74px);
      font-weight: 1000;
      letter-spacing: -.08em;
      line-height: 1;
    }

    .role-card {
      display: none;
      gap: 7px;
      padding: 18px;
      border-radius: 22px;
      text-align: center;
    }

    .role-card.show { display: grid; }

    .role-card span {
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: .12em;
      font-weight: 950;
      opacity: .78;
    }

    .role-card strong {
      font-size: clamp(26px, 8vw, 34px);
      letter-spacing: -.045em;
      line-height: 1.05;
    }

    .agent {
      background: linear-gradient(145deg, rgba(104,211,145,.22), rgba(72,187,120,.1));
      border: 1px solid rgba(104,211,145,.25);
    }

    .spy {
      background: linear-gradient(145deg, rgba(248,113,113,.24), rgba(239,68,68,.1));
      border: 1px solid rgba(248,113,113,.27);
    }

    .result-title {
      font-size: clamp(31px, 9vw, 42px);
      letter-spacing: -.055em;
      line-height: 1.02;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .screen { display: none; }
    .screen.active { display: grid; gap: 14px; }

    .footer-note {
      margin-top: 12px;
      text-align: center;
      color: rgba(255,255,255,.45);
      font-size: 12px;
    }

    @media (max-width: 360px) {
      .card { padding: 16px; border-radius: 26px; }
      .brand { gap: 11px; }
      .logo { width: 45px; height: 45px; }
      h1 { font-size: 26px; }
      .mini-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="card">
      <header class="brand">
        <div class="logo">?</div>
        <div>
          <h1>Infiltrado</h1>
          <p>Spyfall simple para jugar hablando por WhatsApp o Meet.</p>
        </div>
      </header>

      <div id="notice" class="notice"></div>

      <section id="home-screen" class="screen active">
        <label>
          Tu nombre
          <input id="name-input" autocomplete="nickname" maxlength="24" placeholder="Ej: Mateo" />
        </label>

        <button id="create-room-btn" class="primary">Crear sala</button>

        <div class="divider">o</div>

        <label>
          Código de sala
          <input id="join-code-input" inputmode="text" autocomplete="off" autocapitalize="characters" placeholder="ABC-123" />
        </label>

        <button id="join-room-btn">Unirse</button>
      </section>

      <section id="room-screen" class="screen">
        <div class="room-header">
          <div>
            <span class="eyebrow">Sala</span>
            <strong id="room-code" class="code">---</strong>
          </div>
          <button id="copy-link-btn" class="ghost">Copiar link</button>
        </div>

        <div id="players" class="players"></div>

        <div id="lobby-panel" class="panel">
          <h2>Esperando inicio</h2>
          <p class="muted">Abrí la videollamada aparte. Cuando estén todos, el host inicia la ronda.</p>
          <button id="start-round-btn" class="primary">Iniciar ronda</button>
        </div>

        <div id="playing-panel" class="panel" style="display:none">
          <div id="timer" class="timer">8:00</div>
          <p id="round-number" class="muted">Ronda 1</p>

          <button id="toggle-role-btn" class="primary">Ver mi rol</button>

          <div id="role-card" class="role-card">
            <span id="role-label"></span>
            <strong id="role-value"></strong>
            <p id="role-help" class="muted"></p>
          </div>

          <button id="reveal-btn">Terminar y revelar</button>
        </div>

        <div id="revealed-panel" class="panel" style="display:none">
          <span class="eyebrow">Resultado</span>
          <h2 id="result-location" class="result-title">---</h2>
          <p id="result-spy" class="muted"></p>
          <button id="new-round-btn" class="primary">Nueva ronda</button>
          <button id="back-lobby-btn" class="ghost">Volver al lobby</button>
        </div>

        <div class="mini-row">
          <button id="reset-player-btn" class="ghost">Cambiar nombre</button>
          <button id="leave-room-btn" class="danger-btn">Salir</button>
        </div>
      </section>
    </main>

    <div class="footer-note">Hecho para jugar desde el celu. Sin login.</div>
  </div>

  <script type="module">
    import { init, id } from "https://esm.sh/@instantdb/core@1.0.22";

    // 1) Creá una app en https://instantdb.com/dash
    // 2) Copiá el Public App ID
    // 3) Reemplazá este texto por tu ID real
    const APP_ID = "8d3a9ef7-a0e6-41a3-b241-96eefa81a666";

    const db = init({ appId: APP_ID });

    const LOCATIONS = [
      "Submarino",
      "Estación espacial",
      "Hotel de lujo",
      "Hospital",
      "Escuela de magia",
      "Bar pirata",
      "Museo",
      "Aeropuerto",
      "Crucero",
      "Base antártica",
      "Castillo medieval",
      "Supermercado",
      "Laboratorio secreto",
      "Parque de diversiones",
      "Restaurante elegante",
      "Cine abandonado",
      "Tren nocturno",
      "Isla tropical",
      "Fábrica de juguetes",
      "Biblioteca antigua",
      "Casino",
      "Comisaría",
      "Spa",
      "Circo",
      "Mansión embrujada",
      "Nave pirata",
      "Cancha de fútbol",
      "Shopping",
      "Taller mecánico",
      "Búnker secreto"
    ];

    const ROUND_SECONDS = 8 * 60;
    const MAX_PLAYERS = 4;

    const $ = (id) => document.getElementById(id);

    const els = {
      notice: $("notice"),
      homeScreen: $("home-screen"),
      roomScreen: $("room-screen"),
      nameInput: $("name-input"),
      joinCodeInput: $("join-code-input"),
      createRoomBtn: $("create-room-btn"),
      joinRoomBtn: $("join-room-btn"),
      roomCode: $("room-code"),
      copyLinkBtn: $("copy-link-btn"),
      players: $("players"),
      lobbyPanel: $("lobby-panel"),
      playingPanel: $("playing-panel"),
      revealedPanel: $("revealed-panel"),
      startRoundBtn: $("start-round-btn"),
      timer: $("timer"),
      roundNumber: $("round-number"),
      toggleRoleBtn: $("toggle-role-btn"),
      roleCard: $("role-card"),
      roleLabel: $("role-label"),
      roleValue: $("role-value"),
      roleHelp: $("role-help"),
      revealBtn: $("reveal-btn"),
      resultLocation: $("result-location"),
      resultSpy: $("result-spy"),
      newRoundBtn: $("new-round-btn"),
      backLobbyBtn: $("back-lobby-btn"),
      leaveRoomBtn: $("leave-room-btn"),
      resetPlayerBtn: $("reset-player-btn"),
    };

    const state = {
      playerId: getOrCreatePlayerId(),
      playerName: localStorage.getItem("infiltrado_player_name") || "",
      roomCode: localStorage.getItem("infiltrado_room_code") || "",
      room: null,
      unsubscribe: null,
      showRole: false,
      now: Date.now(),
    };

    els.nameInput.value = state.playerName;

    const params = new URLSearchParams(location.search);
    const roomFromUrl = normalizeCode(params.get("room") || "");
    if (roomFromUrl) {
      state.roomCode = roomFromUrl;
      localStorage.setItem("infiltrado_room_code", state.roomCode);
    }

    if (state.roomCode) {
      showScreen("room");
      subscribeToRoom(state.roomCode);
    }

    setInterval(() => {
      state.now = Date.now();
      render();
    }, 1000);

    els.nameInput.addEventListener("input", () => {
      state.playerName = els.nameInput.value.trim();
      if (state.playerName) localStorage.setItem("infiltrado_player_name", state.playerName);
    });

    els.joinCodeInput.addEventListener("input", () => {
      els.joinCodeInput.value = normalizeCode(els.joinCodeInput.value);
    });

    els.createRoomBtn.addEventListener("click", createRoom);
    els.joinRoomBtn.addEventListener("click", joinRoom);
    els.copyLinkBtn.addEventListener("click", copyInviteLink);
    els.startRoundBtn.addEventListener("click", startRound);
    els.toggleRoleBtn.addEventListener("click", toggleRole);
    els.revealBtn.addEventListener("click", revealRound);
    els.newRoundBtn.addEventListener("click", startRound);
    els.backLobbyBtn.addEventListener("click", backToLobby);
    els.leaveRoomBtn.addEventListener("click", leaveRoom);
    els.resetPlayerBtn.addEventListener("click", resetPlayerName);

    function getOrCreatePlayerId() {
      const key = "infiltrado_player_id";
      let value = localStorage.getItem(key);
      if (!value) {
        value = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + String(Math.random());
        localStorage.setItem(key, value);
      }
      return value;
    }

    function normalizeCode(value) {
      return String(value || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g, "")
        .replace(/[^A-Z0-9-]/g, "");
    }

    function randomRoomCode() {
      const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ";
      const numbers = "23456789";
      let code = "";
      for (let i = 0; i < 3; i++) code += letters[Math.floor(Math.random() * letters.length)];
      code += "-";
      for (let i = 0; i < 3; i++) code += numbers[Math.floor(Math.random() * numbers.length)];
      return code;
    }

    function pickRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function formatTime(seconds) {
      const safe = Math.max(0, seconds || 0);
      const m = Math.floor(safe / 60);
      const s = safe % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function showNotice(message, type = "normal") {
      els.notice.textContent = message;
      els.notice.className = `notice show ${type === "danger" ? "danger" : ""}`;
      clearTimeout(showNotice.timer);
      showNotice.timer = setTimeout(() => {
        els.notice.className = "notice";
      }, 3600);
    }

    function showScreen(name) {
      els.homeScreen.classList.toggle("active", name === "home");
      els.roomScreen.classList.toggle("active", name === "room");
    }

    function requireName() {
      state.playerName = els.nameInput.value.trim();
      if (!state.playerName) {
        showNotice("Primero poné tu nombre.");
        els.nameInput.focus();
        return false;
      }
      localStorage.setItem("infiltrado_player_name", state.playerName);
      return true;
    }

    function playerObject() {
      return {
        id: state.playerId,
        name: state.playerName,
        joinedAt: Date.now(),
      };
    }

    async function createRoom() {
      if (!requireName()) return;
      const code = randomRoomCode();
      const roomId = id();

      try {
        await db.transact(
          db.tx.spyfallRooms[roomId].update({
            code,
            hostId: state.playerId,
            players: [playerObject()],
            round: null,
            createdAt: Date.now(),
            updatedAt: Date.now(),
          })
        );
        enterRoom(code);
      } catch (err) {
        console.error(err);
        showNotice("No pude crear la sala. Revisá permisos/schema en InstantDB. Detalle: " + (err?.message || err), "danger");
      }
    }

    function joinRoom() {
      if (!requireName()) return;
      const code = normalizeCode(els.joinCodeInput.value);
      if (!code) {
        showNotice("Pegá o escribí el código de sala.");
        return;
      }
      enterRoom(code);
    }

    function enterRoom(code) {
      state.roomCode = code;
      localStorage.setItem("infiltrado_room_code", code);
      history.replaceState(null, "", `${location.pathname}?room=${encodeURIComponent(code)}`);
      showScreen("room");
      subscribeToRoom(code);
    }

    function subscribeToRoom(code) {
      if (state.unsubscribe) state.unsubscribe();
      els.roomCode.textContent = code;

      state.unsubscribe = db.subscribeQuery(
        {
          spyfallRooms: {
            $: { where: { code } },
          },
        },
        async (resp) => {
          if (resp.error) {
            showNotice("Error de InstantDB: " + resp.error.message, "danger");
            return;
          }

          state.room = resp.data?.spyfallRooms?.[0] || null;

          if (state.room) {
            await ensureJoined();
          }

          render();
        }
      );
    }

    async function ensureJoined() {
      const room = state.room;
      if (!room || !state.playerName) return;

      const players = room.players || [];
      const alreadyIn = players.some((p) => p.id === state.playerId);
      if (alreadyIn) return;

      if (players.length >= MAX_PLAYERS) {
        showNotice("La sala ya tiene 4 jugadores.", "danger");
        return;
      }

      await updateRoom({
        players: [...players, playerObject()],
      });
    }

    async function updateRoom(patch) {
      if (!state.room?.id) return;

      try {
        await db.transact(
          db.tx.spyfallRooms[state.room.id].update({
            ...patch,
            updatedAt: Date.now(),
          })
        );
      } catch (err) {
        console.error(err);
        showNotice("No pude guardar el cambio en InstantDB. Detalle: " + (err?.message || err), "danger");
      }
    }

    function getPlayers() {
      return state.room?.players || [];
    }

    function getMe() {
      return getPlayers().find((p) => p.id === state.playerId);
    }

    function isHost() {
      return state.room?.hostId === state.playerId;
    }

    async function startRound() {
      const players = getPlayers();
      if (!isHost()) {
        showNotice("Solo el host puede iniciar la ronda.");
        return;
      }
      if (players.length < 3) {
        showNotice("Funciona mejor con al menos 3 jugadores.");
        return;
      }

      const locationName = pickRandom(LOCATIONS);
      const spy = pickRandom(players);
      const assignments = {};

      players.forEach((p) => {
        assignments[p.id] = p.id === spy.id
          ? { role: "spy" }
          : { role: "agent", location: locationName };
      });

      state.showRole = false;

      await updateRoom({
        round: {
          status: "playing",
          roundNumber: ((state.room?.round?.roundNumber || 0) + 1),
          location: locationName,
          spyId: spy.id,
          assignments,
          startedAt: Date.now(),
          durationSec: ROUND_SECONDS,
        },
      });
    }

    async function revealRound() {
      if (!isHost()) {
        showNotice("Solo el host puede revelar el resultado.");
        return;
      }
      const round = state.room?.round;
      if (!round) return;
      await updateRoom({
        round: {
          ...round,
          status: "revealed",
          endedAt: Date.now(),
        },
      });
    }

    async function backToLobby() {
      if (!isHost()) {
        showNotice("Solo el host puede volver al lobby.");
        return;
      }
      state.showRole = false;
      await updateRoom({ round: null });
    }

    function toggleRole() {
      state.showRole = !state.showRole;
      render();
    }

    async function leaveRoom() {
      const room = state.room;
      if (room) {
        const players = getPlayers();
        const remaining = players.filter((p) => p.id !== state.playerId);
        const newHostId = room.hostId === state.playerId ? (remaining[0]?.id || null) : room.hostId;
        await updateRoom({
          players: remaining,
          hostId: newHostId,
          round: remaining.length ? room.round : null,
        });
      }

      localStorage.removeItem("infiltrado_room_code");
      state.room = null;
      state.roomCode = "";
      state.showRole = false;
      if (state.unsubscribe) state.unsubscribe();
      state.unsubscribe = null;
      history.replaceState(null, "", location.pathname);
      showScreen("home");
    }

    function resetPlayerName() {
      localStorage.removeItem("infiltrado_player_name");
      els.nameInput.value = "";
      state.playerName = "";
      showScreen("home");
      showNotice("Poné tu nombre de nuevo y volvé a entrar a la sala.");
    }

    async function copyInviteLink() {
      const url = `${location.origin}${location.pathname}?room=${encodeURIComponent(state.roomCode)}`;
      try {
        await navigator.clipboard.writeText(url);
        showNotice("Link copiado. También podés pasar el código: " + state.roomCode);
      } catch {
        showNotice("Código de sala: " + state.roomCode);
      }
    }

    function secondsLeft(round) {
      if (!round?.startedAt || round.status !== "playing") return 0;
      const elapsed = Math.floor((Date.now() - round.startedAt) / 1000);
      return Math.max(0, (round.durationSec || ROUND_SECONDS) - elapsed);
    }

    function renderPlayers() {
      const players = getPlayers();
      const html = [];

      players.forEach((p) => {
        const tags = [];
        if (p.id === state.room?.hostId) tags.push(`<span class="tag">host</span>`);
        if (p.id === state.playerId) tags.push(`<span class="tag">vos</span>`);

        html.push(`
          <div class="player">
            <strong>${escapeHtml(p.name)}</strong>
            <div class="tags">${tags.join("")}</div>
          </div>
        `);
      });

      for (let i = players.length; i < MAX_PLAYERS; i++) {
        html.push(`<div class="player empty-slot">Esperando jugador...</div>`);
      }

      els.players.innerHTML = html.join("");
    }

    function render() {
      els.roomCode.textContent = state.roomCode || "---";

      if (!state.room && state.roomCode) {
        els.players.innerHTML = "";
        els.lobbyPanel.style.display = "grid";
        els.playingPanel.style.display = "none";
        els.revealedPanel.style.display = "none";
        els.lobbyPanel.innerHTML = `
          <h2>Sala no encontrada</h2>
          <p class="muted">Si el código está bien, puede tardar un instante. Si no existe, creá una nueva.</p>
          <button id="create-missing-btn" class="primary">Crear sala nueva</button>
        `;
        $("create-missing-btn")?.addEventListener("click", createRoom);
        return;
      }

      if (!state.room) return;

      renderPlayers();

      const round = state.room.round;
      const host = isHost();

      els.startRoundBtn.style.display = host ? "block" : "none";
      els.revealBtn.style.display = host ? "block" : "none";
      els.newRoundBtn.style.display = host ? "block" : "none";
      els.backLobbyBtn.style.display = host ? "block" : "none";

      if (!round) {
        els.lobbyPanel.style.display = "grid";
        els.playingPanel.style.display = "none";
        els.revealedPanel.style.display = "none";
        els.lobbyPanel.innerHTML = `
          <h2>Esperando inicio</h2>
          <p class="muted">Abrí la videollamada aparte. Cuando estén todos, el host inicia la ronda.</p>
          ${host ? `<button id="start-round-btn-inline" class="primary">Iniciar ronda</button>` : `<p class="muted">Esperando que el host inicie.</p>`}
        `;
        $("start-round-btn-inline")?.addEventListener("click", startRound);
        return;
      }

      if (round.status === "playing") {
        els.lobbyPanel.style.display = "none";
        els.playingPanel.style.display = "grid";
        els.revealedPanel.style.display = "none";

        const left = secondsLeft(round);
        els.timer.textContent = formatTime(left);
        els.roundNumber.textContent = `Ronda ${round.roundNumber || 1}`;
        els.revealBtn.textContent = left === 0 ? "Revelar resultado" : "Terminar y revelar";
        els.toggleRoleBtn.textContent = state.showRole ? "Ocultar mi rol" : "Ver mi rol";

        const assignment = round.assignments?.[state.playerId];
        els.roleCard.className = "role-card";
        if (state.showRole && assignment) {
          els.roleCard.classList.add("show");
          if (assignment.role === "spy") {
            els.roleCard.classList.add("spy");
            els.roleLabel.textContent = "Tu rol";
            els.roleValue.textContent = "Sos el espía";
            els.roleHelp.textContent = "No sabés la ubicación. Improvisá sin levantar sospechas.";
          } else {
            els.roleCard.classList.add("agent");
            els.roleLabel.textContent = "Ubicación";
            els.roleValue.textContent = assignment.location;
            els.roleHelp.textContent = "Hacé preguntas que no revelen demasiado.";
          }
        } else {
          els.roleCard.classList.remove("show");
        }
        return;
      }

      if (round.status === "revealed") {
        els.lobbyPanel.style.display = "none";
        els.playingPanel.style.display = "none";
        els.revealedPanel.style.display = "grid";

        const spy = getPlayers().find((p) => p.id === round.spyId);
        els.resultLocation.textContent = round.location || "Ubicación desconocida";
        els.resultSpy.innerHTML = `El espía era <strong>${escapeHtml(spy?.name || "alguien misterioso")}</strong>.`;
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
